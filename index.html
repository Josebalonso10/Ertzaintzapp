<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERTZAINTZA</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<!-- =====================================================
CABECERA
===================================================== -->


<header class="topbar">


<div class="brand">


<img
src="assets/ertzaintza.png"
class="logo"
alt="Escudo Ertzaintza"
>


<h1>

ERTZAINTZA

</h1>


</div>



<div class="top-actions">



<button onclick="App.toggleDarkMode()">

🌙

</button>




<button onclick="App.openProfile()">

👤

<span id="userName">

Invitado

</span>


</button>




<button onclick="App.logout()">

Cerrar sesión

</button>



</div>


</header>







<!-- =====================================================
MENU PRINCIPAL
===================================================== -->


<nav class="menu">


<button onclick="App.showPage('calendar')">

Calendario

</button>



<button onclick="App.showPage('summary')">

Resumen

</button>



<button onclick="App.showPage('settings')">

Configuración

</button>




<button
id="adminButton"
style="display:none"
onclick="App.showPage('admin')">

Panel Admin

</button>



</nav>








<!-- =====================================================
SELECTOR DE GRUPO
===================================================== -->


<section class="selector">


<label>

Ciclo de trabajo:

</label>



<select
id="groupSelector"
onchange="App.changeGroup(this.value)"
>


<option value="G1">

G1

</option>


<option value="G2">

G2

</option>


<option value="G3">

G3

</option>


<option value="G4">

G4

</option>


<option value="G5">

G5

</option>


</select>


</section>








<!-- =====================================================
CALENDARIO
===================================================== -->


<section
id="calendar"
class="page">


</section>








<!-- =====================================================
RESUMEN
===================================================== -->


<section
id="summary"
class="page"
style="display:none">


</section>








<!-- =====================================================
CONFIGURACION
===================================================== -->


<section
id="settings"
class="page"
style="display:none">


<div class="settings-box">


<h2>

Configuración

</h2>



<div id="settingsContent">


</div>


</div>


</section>








<!-- =====================================================
ADMIN
===================================================== -->


<section
id="admin"
class="page"
style="display:none">


<div id="adminPanel">


</div>


</section>








<!-- =====================================================
LOGIN / REGISTRO
===================================================== -->


<div
id="loginModal"
class="modal">


<div class="modal-content">


<h2>

ERTZAINTZA

</h2>



<img
src="assets/ertzaintza.png"
class="logo"
>



<h3>

Acceso usuario

</h3>




<input

id="loginProfessional"

placeholder="Número profesional"

>



<input

id="loginPassword"

type="password"

placeholder="Contraseña"

>



<button onclick="App.login()">

Entrar

</button>





<hr>





<h3>

Nuevo registro

</h3>




<input

id="registerName"

placeholder="Nombre"

>



<input

id="registerProfessional"

placeholder="Número profesional"

>



<input

id="registerPassword"

type="password"

placeholder="Contraseña"

>



<button onclick="App.register()">

Solicitar alta

</button>



</div>


</div>










<!-- =====================================================
SCRIPTS
===================================================== -->


<!-- Núcleo -->

<script src="js/config.js"></script>

<script src="js/storage.js"></script>



<!-- Configuración -->

<script src="js/settings.js"></script>

<script src="js/holidays.js"></script>



<!-- Motor -->

<script src="js/shifts.js"></script>

<script src="js/engine.js"></script>



<!-- Datos -->

<script src="js/extras.js"></script>

<script src="js/auth.js"></script>



<!-- Interfaz -->

<script src="js/calendar.js"></script>

<script src="js/summary.js"></script>

<script src="js/admin.js"></script>

<script src="js/ui.js"></script>



<!-- Aplicación -->

<script src="js/app.js"></script>



</body>

</html>
