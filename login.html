<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERTZAINTZA - Acceso</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <div class="login-logo-wrap">
      <img class="login-logo" src="assets/logo.svg" alt="Logo Ertzaintza" onerror="this.style.display='none'">
    </div>

    <section class="login-card glass-card">
      <h1 class="login-title">ERTZAINTZA</h1>
      <p class="login-subtitle">Acceso al calendario de turnos y complementos.</p>

      <div class="auth-switch">
        <button type="button" class="auth-tab-btn active" data-auth-tab="login">Iniciar sesión</button>
        <button type="button" class="auth-tab-btn" data-auth-tab="register">Registro</button>
      </div>

      <div id="loginError" class="form-message hidden"></div>
      <div id="registerError" class="form-message hidden"></div>

      <form id="loginForm" class="auth-form active">
        <label for="loginProfessionalId">Número profesional</label>
        <input id="loginProfessionalId" name="professional_id" type="text" inputmode="numeric" autocomplete="username" placeholder="12345" required>

        <label for="loginPassword">Contraseña</label>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>

        <button type="submit" class="primary-btn">Entrar</button>
      </form>

      <form id="registerForm" class="auth-form">
        <label for="registerProfessionalId">Número profesional</label>
        <input id="registerProfessionalId" name="professional_id" type="text" inputmode="numeric" autocomplete="username" placeholder="12345" required>

        <label for="registerPassword">Contraseña</label>
        <input id="registerPassword" name="password" type="password" autocomplete="new-password" placeholder="Introduce tu contraseña" required>

        <label for="registerPasswordConfirm">Repetir contraseña</label>
        <input id="registerPasswordConfirm" name="password_confirm" type="password" autocomplete="new-password" placeholder="Repite tu contraseña" required>

        <button type="submit" class="primary-btn">Solicitar alta</button>
      </form>

      <p class="login-footer">Un administrador deberá aprobar tu registro antes de poder entrar.</p>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
